<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF to JPEG/PNG Converter</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="card">
    <h1>PDF &rarr; Image</h1>
    <p class="subtitle">Convert the first page of a PDF to JPEG or PNG. Runs entirely in your browser &mdash; nothing is uploaded.</p>

    <div id="dropzone" class="dropzone">
      <p>Drag &amp; drop a PDF here, or click to choose a file</p>
      <input type="file" id="fileInput" accept="application/pdf" hidden>
    </div>

    <p id="fileName" class="file-name" hidden></p>

    <div id="controls" class="controls" hidden>
      <label>
        Format
        <select id="format">
          <option value="image/jpeg">JPEG</option>
          <option value="image/png">PNG</option>
        </select>
      </label>

      <label id="qualityLabel">
        Quality
        <input type="range" id="quality" min="0.1" max="1" step="0.05" value="0.92">
      </label>

      <button id="convertBtn">Convert</button>
    </div>

    <p id="error" class="error" hidden></p>

    <canvas id="canvas" hidden></canvas>

    <p id="status" class="status" hidden>&#10003; Conversion ready</p>

    <a id="downloadLink" class="download" hidden download="converted.jpg">Download Image</a>

    <p class="api-link"><a href="api-docs.html">Prefer to call this from code? See the API docs &rarr;</a></p>
  </main>

  <script type="module" src="app.js"></script>
</body>
</html>
